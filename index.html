<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Limora Surprises</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; }
    </style>
  </head>
  <body>
    <a-scene
      mindar-image="imageTargetSrc: targets.mind;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#myvideo"
          width="1"
          height="0.552"
          position="0 0 0"
        ></a-video>
      </a-entity>
      <a-assets>
        <video
          id="myvideo"
          src="https://raw.githubusercontent.com/limorasurprises/Limora-surprise/main/VID_20260401_085138_548.mp4"
          autoplay
          loop
          playsinline
          crossorigin="anonymous"
        ></video>
      </a-assets>
    </a-scene>
   <script>
  const video = document.querySelector("#myvideo");

  document.querySelector("a-scene").addEventListener("loaded", () => {
    video.play().catch(() => {});
  });
   </script> 
  </body>
</html>
