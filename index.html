<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Limora Surprise</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #startScreen {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      z-index: 9999;
      flex-direction: column;
    }

    #surpriseText {
      position: fixed;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 22px;
      opacity: 0;
      transition: 1s;
      z-index: 9998;
    }
  </style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">🎁 Tap anywhere to start 🎁</div>

<!-- SURPRISE TEXT -->
<div id="surpriseText">✨ Surprise Activated ✨</div>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" vidhandler>

    <a-video
      src="#myvideo"
      width="1"
      height="0.552"
      position="0 0 0"
      material="shader: flat"
      animation="property: scale; to: 1.1 1.1 1.1; dir: alternate; loop: true; dur: 1500"
    ></a-video>

  </a-entity>

  <a-assets>
    <video
      id="myvideo"
      src="https://res.cloudinary.com/dm8xq6w9m/video/upload/v1776190305/VID_20260401_085138_832_ft1lyx.mp4"
      loop
      playsinline
      muted
      crossorigin="anonymous"
      preload="auto"
    ></video>
  </a-assets>

</a-scene>

<script>
AFRAME.registerComponent('vidhandler', {
  init: function () {
    const video = document.querySelector("#myvideo");

    this.el.addEventListener("targetFound", () => {
      video.play();

      document.getElementById("surpriseText").style.opacity = "1";
    });

    this.el.addEventListener("targetLost", () => {
      video.pause();
    });
  }
});

// 🔊 SOUND UNLOCK (IMPORTANT)
document.addEventListener("pointerdown", () => {
  const video = document.querySelector("#myvideo");

  video.muted = false;
  video.volume = 1;
  video.play().catch(() => {});
}, { once: true });

// start screen remove
document.getElementById("startScreen").addEventListener("click", () => {
  document.getElementById("startScreen").style.display = "none";
});
</script>

</body>
</html>
